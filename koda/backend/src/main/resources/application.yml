spring:
  application:
    name: koda-backend

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/koda_db
    username: ${DB_USER:koda_user}
    password: ${DB_PASSWORD:koda_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  servlet:
    context-path: /api

koda:
  inference:
    url: ${INFERENCE_URL:http://localhost:8000}
  jwt:
    secret: ${JWT_SECRET:changeme_dev_secret_key_change_in_production}
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html
